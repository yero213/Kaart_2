version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/backend
    environment:
      - ENV=development
    # Zorgt ervoor dat code-wijzigingen lokaal direct herladen worden in de container
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload