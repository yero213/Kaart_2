name: Backend CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Haal de code op uit de repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Installeer de gewenste Python versie
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip" # Automatische caching van pip downloads voor snellere builds

      # 3. Installeer de vereiste packages binnen de GitHub runner
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      # 4. Voer de testsuite uit met pytest
      - name: Run Tests met Pytest
        run: |
          pytest backend/tests/
          # We vertellen Python expliciet waar de app-map staat om import-fouten te voorkomen
          PYTHONPATH=backend pytest backend/tests/
